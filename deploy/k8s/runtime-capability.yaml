apiVersion: v1
kind: ConfigMap
metadata:
  name: browser-runtime-network-proxy
data:
  network-proxy.json: |
    {"proxy_by_name_map": {}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: browser-runtime-profile-source
data:
  .keep: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: browser-runtime-artifact-output
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: browser-runtime-profile-runtime
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: browser-runtime-profile-writeback
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-mcp
  labels:
    app.kubernetes.io/name: browser-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browser-mcp
    spec:
      automountServiceAccountToken: false
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
      volumes:
        - name: artifact-output
          persistentVolumeClaim:
            claimName: browser-runtime-artifact-output
        - name: network-proxy-config
          configMap:
            name: browser-runtime-network-proxy
        - name: profile-runtime
          persistentVolumeClaim:
            claimName: browser-runtime-profile-runtime
        - name: profile-source
          configMap:
            name: browser-runtime-profile-source
        - name: profile-writeback
          persistentVolumeClaim:
            claimName: browser-runtime-profile-writeback
        - name: runtime-work
          emptyDir: {}
      containers:
        - name: browser-mcp
          image: browser-runtime-playwright:latest
          args:
            - browser-runtime-playwright-mcp-router
            - --secret-root-path
            - /input/.secret
            - --profile-root-path
            - /runtime/mcp_playwright_profile/profile
            - --candidate-root-path
            - /runtime/mcp_playwright_profile/writeback_candidate
            - --output-root-path
            - /output/.playwright-mcp
            - --backend-runtime-root-path
            - /runtime/playwright_mcp_backend
            - --network-proxy-config-path
            - /runtime-config/network-proxy.json
            - --host
            - 0.0.0.0
            - --allowed-hosts
            - localhost,127.0.0.1,browser-mcp
            - --port
            - "8931"
          env:
            - name: TZ
              value: UTC
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          ports:
            - name: mcp
              containerPort: 8931
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          volumeMounts:
            - name: artifact-output
              mountPath: /output
            - name: network-proxy-config
              mountPath: /runtime-config
              readOnly: true
            - name: profile-runtime
              mountPath: /runtime/mcp_playwright_profile/profile
            - name: profile-source
              mountPath: /input/.secret/playwright_profile
              readOnly: true
            - name: profile-writeback
              mountPath: /runtime/mcp_playwright_profile/writeback_candidate
            - name: runtime-work
              mountPath: /runtime/playwright_mcp_backend
---
apiVersion: v1
kind: Service
metadata:
  name: browser-mcp
spec:
  selector:
    app.kubernetes.io/name: browser-mcp
  ports:
    - name: mcp
      port: 8931
      protocol: TCP
      targetPort: mcp
